data:
  train_files: ${oc.env:REPO_ROOT}/training/verl/data/train.parquet
  val_files: ${oc.env:REPO_ROOT}/training/verl/data/val.parquet
  prompt_key: prompt
  train_batch_size: 64
  val_batch_size: 128
  max_prompt_length: 8192
  max_response_length: 1024
  truncation: error
  filter_overlong_prompts: true

algorithm:
  adv_estimator: grpo
  kl_ctrl:
    kl_coef: 0.001

actor_rollout_ref:
  model:
    path: ${oc.env:MODEL_PATH}
    enable_gradient_checkpointing: true
    use_remove_padding: true
  actor:
    strategy: fsdp
    optim:
      lr: 1e-6
    ppo_mini_batch_size: 16
    ppo_micro_batch_size_per_gpu: 4
    use_dynamic_bsz: true
    ppo_max_token_len_per_gpu: 16384
    use_kl_loss: true
    kl_loss_coef: 0.001
    kl_loss_type: low_var_kl
    entropy_coeff: 0.0
    fsdp_config:
      param_offload: false
      optimizer_offload: false
  ref:
    log_prob_micro_batch_size_per_gpu: 4
    fsdp_config:
      param_offload: false
  rollout:
    name: vllm
    tensor_model_parallel_size: 1
    gpu_memory_utilization: 0.8
    temperature: 0.7
    top_p: 0.95
    top_k: -1
    n: 8
    log_prob_micro_batch_size_per_gpu: 4
    max_num_batched_tokens: 16384
    val_kwargs:
      do_sample: true
      temperature: 0.7
      top_p: 0.95
      top_k: -1

custom_reward_function:
  path: ${oc.env:REPO_ROOT}/training/verl/half_subdivision_reward.py
  name: compute_score

trainer:
  total_epochs: 1
  critic_warmup: 0
  logger: ["console"]
  project_name: half_subdivision_grpo
  experiment_name: qwen3_8b_half_subdivision
  val_before_train: true
  val_freq: 10
  save_freq: 10
  test_freq: 10
  default_local_dir: ${oc.env:RUN_DIR}
  n_gpus_per_node: 1
  nnodes: 1
