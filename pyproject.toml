[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "scbench-posttrain"
version = "0.1.0"
description = "Small SCBench post-training scaffold"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2.8",
]

[dependency-groups]
dev = [
  "pytest>=8.3",
  "ruff>=0.6",
]

[project.optional-dependencies]
inspect = [
  "inspect-ai>=0.3",
]
tinker = [
  "tinker-cookbook>=0.1.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/scbench_posttrain"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"
